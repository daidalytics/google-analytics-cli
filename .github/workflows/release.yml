name: Release

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest

      - name: Inject OAuth credentials
        run: |
          sed -i 's/__OAUTH_CLIENT_ID__/${{ secrets.OAUTH_CLIENT_ID }}/' src/ga_cli/config/constants.py
          sed -i 's/__OAUTH_CLIENT_SECRET__/${{ secrets.OAUTH_CLIENT_SECRET }}/' src/ga_cli/config/constants.py

      - name: Build
        run: uv build

      - name: Publish to PyPI
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
